<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>SNN Deployment Index</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        background: #f4f4f4;
        color: #131313;
      }

      main {
        width: min(100% - 2rem, 38rem);
        padding: 2rem;
        border: 1px solid #dfdfdf;
        background: #fff;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #444;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SNN monorepo root</h1>
      <p>This deployment verifies the root build. Storefront, accounts, and admin are served by their dedicated Vercel projects.</p>
    </main>
  </body>
</html>
